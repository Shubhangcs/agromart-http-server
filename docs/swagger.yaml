host: localhost:8080
info:
  contact: {}
  description: Agromart B2B agricultural marketplace backend server.
  title: Agromart API
  version: "1.0"
paths:
  /admin/create:
    post:
      consumes:
      - application/json
      description: Registers a new admin account
      parameters:
      - description: Admin registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateAdminRequest'
      produces:
      - application/json
      responses:
        "201":
          description: admin created successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid payload or validation error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create a new admin
      tags:
      - admins
  /admin/delete/{id}:
    delete:
      description: Deletes the admin with the given ID
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Admin not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete admin
      tags:
      - admins
  /admin/get/admin/{id}:
    get:
      description: Returns the details of the admin with the given ID
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: admin details
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Admin not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get admin details by ID
      tags:
      - admins
  /admin/login:
    post:
      consumes:
      - application/json
      description: Authenticates an admin using email and password and returns a JWT
        token
      parameters:
      - description: Admin login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TokenResponse'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Admin login
      tags:
      - auth
  /admin/update/details/{id}:
    put:
      consumes:
      - application/json
      description: Updates the profile details of the admin with the given ID
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: string
      - description: Admin update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateUserDetailsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update admin profile details
      tags:
      - admins
  /admin/update/image/{id}:
    put:
      description: Returns an S3 presigned URL to upload a profile image for the given
        admin
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PresignedURLResponse'
        "400":
          description: Invalid URL Param
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Generates presigned URL for admin profile image upload and updates
        the image path in database
      tags:
      - Image Upload
  /admin/update/password/{id}:
    put:
