        example: true
        type: boolean
    type: object
  models.AddToWishlistRequestModel:
    properties:
      product_id:
        example: prod-uuid-001
        type: string
    required:
    - product_id
    type: object
  models.BlockUserRequest:
    properties:
      is_user_blocked:
