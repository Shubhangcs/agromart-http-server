  models.CreateProductReviewRequest:
    properties:
      product_id:
        example: prod-uuid-001
        type: string
      review:
        example: Great product quality!
        type: string
      user_id:
        example: user-uuid-001
        type: string
    required:
    - product_id
    - review
    - user_id
    type: object
  models.CreateRFQRequest:
    properties:
      business_id:
        example: biz-uuid-001
        type: string
      category_id:
        example: cat-uuid-001
        type: string
      is_rfq_active:
        example: true
        type: boolean
      price:
        example: 1200.5
        type: number
      product_name:
        example: Wheat
        type: string
      quantity:
        example: 500
        type: number
      sub_category_id:
        example: subcat-uuid-001
        type: string
      unit:
        example: kg
        type: string
    required:
    - business_id
    - category_id
    - product_name
    - sub_category_id
    - unit
