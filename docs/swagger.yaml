        "400":
          description: Invalid payload or missing business ID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Submit a business application
      tags:
      - businesses
  /business/application/get/{id}:
    get:
      description: Returns the application status and details for the business with
