basePath: /
definitions:
  handlers.ErrorResponse:
    properties:
      error:
        example: internal server error
        type: string
    type: object
  handlers.MessageResponse:
    properties:
      message:
        example: operation successful
        type: string
    type: object
  handlers.PresignedURLResponse:
    properties:
      message:
        example: presigned url generated successfully
        type: string
      url:
        example: https://s3.amazonaws.com/bucket/profile/admins/uuid.png?X-Amz-Signature=...
        type: string
    type: object
  handlers.TokenResponse:
    properties:
      token:
