definitions:
  handlers.ErrorResponse:
    properties:
      error:
        example: internal server error
        type: string
    type: object
  handlers.MessageResponse:
    properties:
      message:
        example: operation successful
        type: string
    type: object
  handlers.PresignedURLResponse:
    properties:
      message:
        example: presigned url generated successfully
        type: string
      url:
        example: https://s3.amazonaws.com/bucket/profile/admins/uuid.png?X-Amz-Signature=...
        type: string
    type: object
  handlers.TokenResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  handlers.activateRFQRequest:
    properties:
      is_rfq_active:
        example: true
        type: boolean
    type: object
  handlers.blockUserRequest:
    properties:
      is_user_blocked:
        example: true
        type: boolean
    type: object
  handlers.businessApplicationRequest:
    properties:
      id:
        example: biz-uuid-001
        type: string
      reject_reason:
        example: Documents incomplete
        type: string
      status:
        example: APPLIED
        type: string
    type: object
  handlers.businessRequest:
    properties:
      address:
        example: 123 Market Street
        type: string
      business_type:
        example: TRADER
        type: string
      city:
        example: Pune
        type: string
      email:
        example: business@example.com
        type: string
      name:
        example: Agro Traders Pvt Ltd
        type: string
      phone:
        example: "9876543210"
        type: string
      pincode:
        example: "411001"
        type: string
      state:
        example: Maharashtra
        type: string
      user_id:
        example: user-uuid-001
        type: string
    type: object
  handlers.categoryRequest:
    properties:
      created_at:
        type: string
      description:
        example: All types of grains and cereals
        type: string
      id:
        example: cat-uuid-001
        type: string
      name:
        example: Grains
        type: string
      updated_at:
        type: string
    type: object
  handlers.followerRequest:
    properties:
      business_id:
        example: biz-uuid-001
        type: string
      created_at:
        type: string
      user_id:
        example: user-uuid-001
        type: string
    type: object
  handlers.getTokenByEmailPasswordRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: StrongPass@1
        type: string
    type: object
  handlers.legalRequest:
    properties:
      aadhaar:
        example: 1234-5678-9012
        type: string
      export_import:
        example: IEC123456
        type: string
      fassi:
        example: FASSI123456
        type: string
      gst:
        example: 29ABCDE1234F1Z5
        type: string
      id:
        example: biz-uuid-001
        type: string
      msme:
        example: MSME123456
        type: string
      pan:
        example: ABCDE1234F
        type: string
    type: object
  handlers.productImageRequest:
    properties:
      created_at:
        type: integer
      id:
        type: string
      image:
        type: string
      index:
        type: integer
      product_id:
        type: string
      updated_at:
        type: integer
    type: object
  handlers.registerUserRequest:
    description: Registration request body
    properties:
      email:
        example: john@example.com
        type: string
      first_name:
        example: John
        type: string
      last_name:
        example: Doe
        type: string
      password:
        example: StrongPass@1
        type: string
      phone:
        example: "9876543210"
        type: string
    type: object
  handlers.rfqRequest:
    properties:
      business_id:
        example: biz-uuid-001
        type: string
      category_id:
        example: cat-uuid-001
        type: string
      created_at:
        type: string
      id:
        example: rfq-uuid-001
        type: string
      is_rfq_active:
        example: true
        type: boolean
      price:
        example: 1200.5
        type: number
      product_name:
        example: Wheat
        type: string
      quantity:
        example: 500
        type: number
      sub_category_id:
        example: subcat-uuid-001
        type: string
      unit:
        example: kg
        type: string
      updated_at:
        type: string
    type: object
  handlers.socialRequest:
    properties:
      facebook:
        example: https://facebook.com/agro
        type: string
      id:
        example: biz-uuid-001
        type: string
      instagram:
        example: https://instagram.com/agro
        type: string
      linkedin:
        example: https://linkedin.com/company/agro
        type: string
      telegram:
        example: https://t.me/agro
        type: string
      website:
        example: https://agromart.com
        type: string
      x:
        example: https://x.com/agro
        type: string
      youtube:
        example: https://youtube.com/agro
        type: string
    type: object
  handlers.subCategoryRequest:
    properties:
      category_id:
        example: cat-uuid-001
        type: string
      created_at:
        type: string
      description:
        example: All varieties of wheat
        type: string
      id:
        example: subcat-uuid-001
        type: string
      name:
        example: Wheat
        type: string
      updated_at:
        type: string
    type: object
  handlers.updatePasswordRequest:
    properties:
      password:
        example: NewPass@123
        type: string
    type: object
  handlers.updateUserProfileDetailsRequest:
    properties:
      email:
        example: john@example.com
        type: string
      first_name:
        example: John
        type: string
      last_name:
        example: Doe
        type: string
      phone:
        example: "9876543210"
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Agromart backend server
  title: Agromart API
  version: "1.0"
paths:
  /admin/create:
    post:
      consumes:
      - application/json
      description: Registers a new admin account
      parameters:
      - description: Admin registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.registerUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: admin created successfully
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create a new admin
      tags:
      - admins
  /admin/delete/{id}:
    delete:
      description: Deletes the admin with the given ID
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Delete admin
      tags:
      - admins
  /admin/login:
    post:
      consumes:
      - application/json
      description: Authenticates an admin using email and password, returns a JWT
        token
      parameters:
      - description: Admin login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.getTokenByEmailPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TokenResponse'
        "400":
          description: Invalid payload or incorrect password
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Admin login
      tags:
      - auth
  /admin/update/details/{id}:
    put:
      consumes:
      - application/json
      description: Updates the profile details of the admin with the given ID
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: integer
      - description: Admin update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updateUserProfileDetailsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Update admin profile details
      tags:
      - admins
  /admin/update/image/{id}:
    put:
      description: Returns an S3 presigned URL to upload a profile image for the given
        admin
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PresignedURLResponse'
        "400":
          description: Invalid URL Param
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Generates presigned URL for admin profile image upload and updates
        the image path in database
      tags:
      - Image Upload
  /admin/update/password/{id}:
    put:
      consumes:
      - application/json
      description: Updates the password of the admin with the given ID
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: integer
      - description: New password payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updatePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Update admin password
      tags:
      - admins
  /business/application/accept/{id}:
    put:
      description: Marks the business application for the given ID as accepted
      parameters:
      - description: Business ID
        in: path
        name: id
        required: true
