        example: true
        type: boolean
    type: object
  models.CreateAdminRequest:
    properties:
      email:
        example: admin@example.com
        type: string
      first_name:
        example: John
        type: string
      last_name:
        example: Doe
        type: string
      password:
        example: secret123
        minLength: 8
        type: string
      phone:
        example: "9876543210"
        maxLength: 15
        minLength: 7
        type: string
    required:
    - email
    - first_name
    - password
    - phone
    type: object
  models.CreateApplicationRequest:
    properties:
      id:
        example: biz-uuid-001
        type: string
    required:
    - id
    type: object
  models.CreateBusinessReviewRequest:
    properties:
      business_id:
        example: biz-uuid-001
        type: string
      review:
        example: Excellent service!
        type: string
      user_id:
        example: user-uuid-001
        type: string
    required:
    - business_id
    - review
    - user_id
    type: object
  models.CreateCategoryRequest:
    properties:
      description:
        example: All types of grains and cereals
        type: string
      name:
        example: Grains
        type: string
    required:
    - description
    - name
    type: object
  models.CreateLegalRequest:
    properties:
      aadhaar:
        example: 1234-5678-9012
        type: string
      export_import:
        example: IEC123456
        type: string
      fassi:
        example: FASSI123456
        type: string
      gst:
        example: 29ABCDE1234F1Z5
        type: string
      id:
        example: biz-uuid-001
        type: string
      msme:
        example: MSME123456
        type: string
      pan:
        example: ABCDE1234F
        type: string
    required:
    - id
    type: object
  models.CreateProductRequest:
    properties:
      business_id:
        example: biz-uuid-001
        type: string
      category_id:
        example: cat-uuid-001
        type: string
      description:
        example: High quality wheat
        type: string
      is_product_active:
        example: true
        type: boolean
      moq:
        example: 100kg
        type: string
      name:
        example: Wheat
        type: string
      price:
        example: 25.5
        type: number
      quantity:
        example: 1000
        type: number
      sub_category_id:
        example: subcat-uuid-001
        type: string
      unit:
        example: kg
        type: string
    required:
    - business_id
    - category_id
    - description
    - moq
    - name
    - sub_category_id
    - unit
