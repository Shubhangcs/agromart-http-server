      parameters:
      - description: Business ID
        in: path
        name: id
        required: true
        type: integer
      - description: Rejection reason payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.businessApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Invalid ID, payload, or missing reject reason
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Reject a business application
      tags:
      - businesses
  /business/create:
    post:
      consumes:
      - application/json
      description: Creates a new business profile for a user
      parameters:
      - description: Business creation payload
        in: body
        name: body
        required: true
