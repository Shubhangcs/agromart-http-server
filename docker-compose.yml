services:
  db:
    container_name: "agromartDB"
    image: postgres:18-alpine3.23
    volumes:
      - "./database/postgres-data:/var/lib/postgresql"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "postgres"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    restart: unless-stopped